<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Cipher | Secure Messenger</title>
    <meta name="theme-color" content="#0a0a0c" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Cipher" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      input:-webkit-autofill,
      input:-webkit-autofill:hover, 
      input:-webkit-autofill:focus, 
      input:-webkit-autofill:active{
          -webkit-box-shadow: 0 0 0 100px #1a1a1e inset !important;
          -webkit-text-fill-color: rgba(255, 255, 255, 0.8) !important;
          transition: background-color 5000s ease-in-out 0s;
      }
      .discord-scrollbar::-webkit-scrollbar { width: 6px; }
      .discord-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .discord-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
      .discord-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }
      
      .squircle {
        mask-image: paint(squircle);
        -webkit-mask-image: url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyMDAgMjAwIj48cGF0aCBkPSJNMTAwLDAgQzIwLDAgMCwyMCAwLDEwMCBDMCwxODAgMjAsMjAwIDEwMCwyMDAgQzE4MCwyMDAgMjAwLDE4MCAyMDAsMTAwIEMyMDAsMjAgMTgwLDAgMTAwLDAgWiIvPjwvc3ZnPg==");
        -webkit-mask-size: cover;
        mask-size: cover;
        border-radius: 24%;
      }

      .cipher-grid {
        background-image: 
          linear-gradient(rgba(99, 102, 241, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(99, 102, 241, 0.04) 1px, transparent 1px);
        background-size: 24px 24px;
      }

      @supports (padding-bottom: env(safe-area-inset-bottom)) {
        .safe-bottom { padding-bottom: max(1.25rem, env(safe-area-inset-bottom)) !important; }
        .safe-top { padding-top: env(safe-area-inset-top) !important; }
      }

    </style>
  </head>
  <body class="bg-[#0a0a0c] text-white selection:bg-indigo-500/30 overscroll-none">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
